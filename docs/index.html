<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Возможности отдела</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#141416; --sub:#77777c; --page:#f2f2f0; --card:#ffffff;
  --line:#e4e4e1; --pill:#efefec; --accent:#141416;
}
@media (prefers-color-scheme: dark){
  :root{--ink:#f0f0ee; --sub:#94949a; --page:#101012; --card:#1b1b1e;
        --line:#2a2a2e; --pill:#26262a; --accent:#f0f0ee}
}
*{box-sizing:border-box;margin:0;min-width:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;max-width:100vw;overflow:hidden;overscroll-behavior:none}
body{
  font-family:"Golos Text",-apple-system,sans-serif;
  background:var(--tg-theme-bg-color,var(--page));
  color:var(--tg-theme-text-color,var(--ink));
  display:flex;flex-direction:column;
  padding:max(14px,env(safe-area-inset-top)) 0 calc(52px + 30px + env(safe-area-inset-bottom));
  user-select:none;-webkit-user-select:none;touch-action:none;
}

header{padding:4px 22px 12px;text-align:left}
header .brand{
  font-family:"Unbounded",sans-serif;font-size:.62rem;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:var(--sub);
}
header h1{
  font-family:"Unbounded",sans-serif;font-size:1.02rem;font-weight:700;
  line-height:1.3;letter-spacing:-.01em;margin-top:6px;
}

.dots-top{display:flex;justify-content:center;gap:5px;padding:0 0 12px}

.deck-wrap{flex:1;position:relative;min-height:0;display:flex;align-items:center;justify-content:center}
.deck{position:relative;width:min(88vw,400px);height:100%;max-height:560px}

.swipe-card{
  position:absolute;inset:0;perspective:1200px;
  border-radius:22px;
  box-shadow:0 18px 44px -18px rgba(0,0,0,.22);
  cursor:grab;will-change:transform;
  transition:transform .38s cubic-bezier(.2,.9,.3,1.15), opacity .3s ease;
}
.swipe-card.dragging{transition:none;cursor:grabbing}
.swipe-card.gone{transition:transform .32s ease-in, opacity .28s ease-in;opacity:0}
.swipe-card.flying{transition:transform .34s cubic-bezier(.3,.8,.4,1), opacity .3s ease .06s;opacity:0}

.card-inner{
  position:relative;width:100%;height:100%;
  transition:transform .5s cubic-bezier(.3,.7,.4,1);
  transform-style:preserve-3d;
}
.swipe-card.flipped .card-inner{transform:rotateY(180deg)}

.card-face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;
  background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden;
}
.card-back{transform:rotateY(180deg);padding:16px}

.media{flex:0 0 46%;min-height:0;background:#e9e9e6;position:relative;overflow:hidden}
@media (prefers-color-scheme: dark){.media{background:#26262a}}
.media img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}

.body{flex:1;min-height:0;padding:18px 20px 44px;display:flex;flex-direction:column;gap:8px;position:relative}
.body h3{font-size:1.04rem;font-weight:600;line-height:1.3;letter-spacing:-.01em}
.body p{font-size:.84rem;line-height:1.5;color:var(--sub);flex:1}

.eta{
  position:absolute;left:20px;bottom:16px;
  font-size:.72rem;font-weight:600;color:var(--ink);
  background:var(--pill);padding:5px 11px;border-radius:999px;white-space:nowrap;
  display:inline-flex;align-items:center;gap:4px;
}
.num{
  position:absolute;right:14px;bottom:16px;
  font-family:"Unbounded",sans-serif;font-size:.6rem;font-weight:700;
  letter-spacing:.1em;color:var(--ink);background:var(--pill);
  padding:5px 10px;border-radius:999px;
}

.back-placeholder{
  flex:1;border-radius:16px;border:1.5px dashed var(--line);background:var(--pill);
  display:flex;align-items:center;justify-content:center;text-align:center;
  color:var(--sub);font-size:.78rem;line-height:1.4;padding:16px;
}

footer{padding:14px 22px 2px;display:flex;justify-content:center;text-align:center}
.hint{font-size:.72rem;color:var(--sub);line-height:1.4}
.dots{display:flex;gap:5px}
.dots i{width:5px;height:5px;border-radius:50%;background:var(--line);transition:background .2s,width .2s}
.dots i.on{background:var(--accent);width:14px;border-radius:999px}

.cta{
  position:fixed;left:16px;right:16px;
  bottom:max(16px,env(safe-area-inset-bottom));
  height:52px;border-radius:16px;z-index:40;
  background:var(--accent);color:var(--card);
  font-family:inherit;font-size:.92rem;font-weight:600;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 14px 30px -12px rgba(0,0,0,.4);
}
.cta:active{transform:scale(.98)}

.arrow{
  position:absolute;top:50%;transform:translateY(-50%);z-index:30;
  width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
  background:var(--card);color:var(--ink);font-size:1rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;
}
.arrow:hover{background:var(--pill)}
.arrow.left{left:calc(50% - min(44vw,200px) - 58px)}
.arrow.right{right:calc(50% - min(44vw,200px) - 58px)}
@media (hover:hover) and (min-width:640px){.arrow{display:flex}}

@media (prefers-reduced-motion: reduce){
  .swipe-card, .card-inner{transition:none}
}
</style>
</head>
<body>

<header>
  <div class="brand">Отдел вычислительного проектирования</div>
  <h1>Когда звать нас</h1>
</header>

<div class="dots-top dots" id="dots"></div>

<div class="deck-wrap">
  <button class="arrow left" aria-label="Предыдущая">←</button>
  <div class="deck" id="deck"></div>
  <button class="arrow right" aria-label="Следующая">→</button>
</div>

<footer>
  <div class="hint">Листайте карточку свайпом</div>
</footer>

<button class="cta" id="cta">Это моя задача →</button>

<script>
const CASES = [
  {key:"unique", title:"Много уникальных элементов",
   hint:"Панели, ламели или МАФы не повторяются один в один — руками это дни рутины. Скрипт сам генерирует всю партию по правилам.", eta:"⏱ 2–3 дня"},
  {key:"reference", title:"Есть задумка, но неясно как собрать",
   hint:"Референс — скульптура, паттерн, сложная форма, где рисунок меняется по правилу. Разберём на алгоритм и соберём прототип.", eta:"⏱ 2–3 дня"},
  {key:"curved", title:"Форма здания криволинейная",
   hint:"Объём или фасад не плоский: кривизна целиком или локально. Построим параметрически и разобьём на панели под сборку.", eta:"⏱ 2–3 дня"},
  {key:"revit", title:"Геометрию нужно передать в Revit",
   hint:"Форма из Rhino/Grasshopper должна жить в Revit — семействами, с чистой топологией, без мусорной сетки.", eta:"⏱ 1–2 дня"},
  {key:"repeat", title:"Действие повторяется по всему проекту",
   hint:"Расстановка, разбивка, подрезка — в десятках мест, при правках всё заново. Сделаем инструмент, который пересчитывает за секунды.", eta:"⏱ 1 день"},
  {key:"variants", title:"Нужно перебрать много вариантов",
   hint:"Десятки вариантов паттерна, массинга или панелизации, решение нужно уже сегодня-завтра. Меняете параметр — сразу видите результат.", eta:"⏱ 1–2 дня"},
  {key:"physics", title:"Нужно просчитать физику проекта",
   hint:"Инсоляция, ветер, пешеходные потоки, шум. Считаем сценарии и визуализируем — форма подстраивается осознанно, а не на глаз.", eta:"⏱ 1–2 дня"},
  {key:"custom", title:"Нетиповая или разовая задача",
   hint:"Не попадает в пункты выше: чистка геометрии, скан, графика на 3D-форму или что-то совсем новое. Разберём и решим по ситуации.", eta:"⏱ обсудим"},
];

const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();
tg?.disableVerticalSwipes?.(); // вертикальный драг карточки не должен закрывать Mini App

const deck = document.getElementById("deck");
const dots = document.getElementById("dots");
let current = 0;

CASES.forEach((_, i) => {
  const d = document.createElement("i");
  if (i === 0) d.className = "on";
  dots.appendChild(d);
});

let picked = false; // sendData закрывает Mini App; дубль до закрытия глушим
function pick(key){
  if (picked) return;
  if (tg?.sendData) {
    picked = true;
    tg.sendData(JSON.stringify({case:key}));
  } else {
    // Открыто не из кнопки бота (прямая ссылка/браузер) — sendData недоступен.
    const hint = document.querySelector(".hint");
    hint.textContent = "Выбор работает только внутри Telegram — откройте бота @comp_design_bot и нажмите «Возможности отдела».";
  }
}

function makeCard(idx){
  const c = CASES[idx % CASES.length];
  const el = document.createElement("div");
  el.className = "swipe-card";
  el.dataset.idx = idx % CASES.length;
  el.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="media">
          <img src="img/${c.key}.jpg" alt="" draggable="false" loading="lazy">
        </div>
        <div class="body">
          <h3>${c.title}</h3>
          <p>${c.hint}</p>
          <span class="eta">${c.eta}</span>
          <span class="num">${String(idx % CASES.length + 1).padStart(2,"0")} / ${String(CASES.length).padStart(2,"0")}</span>
        </div>
      </div>
      <div class="card-face card-back">
        <div class="back-placeholder">Примеры такой геометрии</div>
      </div>
    </div>`;
  return el;
}

// стопка из трёх: текущая + две за ней
function layout(){
  const cards = [...deck.children];
  cards.forEach((el, i) => {
    const depth = cards.length - 1 - i;   // 0 = верхняя (последний ребёнок)
    el.style.zIndex = 10 - depth;
    if (!el.classList.contains("dragging")) {
      el.style.transform = `translateY(${depth * 12}px) scale(${1 - depth * .045})`;
      el.style.opacity = depth > 2 ? 0 : 1;
    }
  });
  [...dots.children].forEach((d, i) => d.className = i === current ? "on" : "");
}

function fill(){
  while (deck.children.length < 3) {
    const nextIdx = (current + deck.children.length) % CASES.length;
    deck.insertBefore(makeCard(nextIdx), deck.firstChild);
  }
  layout();
}

let animating = false; // guard: быстрый второй свайп не трогает ту же карточку

function swipe(dir){
  const top = deck.lastElementChild;
  if (!top || animating) return;
  animating = true;
  top.classList.add("gone");
  top.style.transform = `translateX(${dir * 130}%) rotate(${dir * 14}deg)`;
  current = (current + 1) % CASES.length;
  setTimeout(() => { top.remove(); fill(); animating = false; }, 300);
}

function prev(){
  if (animating) return;
  current = (current - 1 + CASES.length) % CASES.length;
  deck.replaceChildren();
  fill();
}

// Драг: одни слушатели на window + активная карточка в переменной,
// иначе на каждую созданную карточку копился бы новый window-хендлер.
const drag = {el: null, startX: 0, startY: 0, dx: 0, moved: false};

function onDown(e){
  const top = deck.lastElementChild;
  if (!top || animating) return;
  const target = e.target;
  if (!top.contains(target)) return;
  drag.el = top;
  drag.moved = false;
  drag.dx = 0;
  const p = e.touches ? e.touches[0] : e;
  drag.startX = p.clientX;
  drag.startY = p.clientY;
  top.classList.add("dragging");
}

function onMove(e){
  if (!drag.el) return;
  const p = e.touches ? e.touches[0] : e;
  drag.dx = p.clientX - drag.startX;
  const dy = p.clientY - drag.startY;
  if (Math.abs(drag.dx) > 8 || Math.abs(dy) > 8) drag.moved = true;
  drag.el.style.transform = `translate(${drag.dx}px, ${dy * .25}px) rotate(${drag.dx * .05}deg)`;
}

function onUp(){
  if (!drag.el) return;
  const el = drag.el;
  drag.el = null;
  el.classList.remove("dragging");
  if (Math.abs(drag.dx) > 90) {
    swipe(Math.sign(drag.dx));
  } else {
    layout();
    // Тап без движения = переворот карточки (детали на обратной стороне).
    // Выбор задачи — только через большую кнопку/Enter (см. chooseCurrent).
    if (!drag.moved) el.classList.toggle("flipped");
  }
}

function chooseCurrent(){
  const top = deck.lastElementChild;
  if (!top || animating) return;
  const key = CASES[top.dataset.idx].key;
  if (!tg?.sendData) { pick(key); return; } // вне Telegram — просто подскажем, картой не жертвуем
  animating = true;
  top.classList.add("flying");
  top.style.transform = "translateY(-140%) scale(.94)";
  setTimeout(() => pick(key), 320);
}

window.addEventListener("touchstart", onDown, {passive:true});
window.addEventListener("touchmove", onMove, {passive:true});
window.addEventListener("touchend", onUp);
window.addEventListener("mousedown", onDown);
window.addEventListener("mousemove", onMove);
window.addEventListener("mouseup", onUp);

document.querySelector(".arrow.right").addEventListener("click", () => swipe(1));
document.querySelector(".arrow.left").addEventListener("click", prev);
document.getElementById("cta").addEventListener("click", chooseCurrent);
window.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") swipe(1);
  if (e.key === "ArrowLeft") prev();
  if (e.key === "Enter") chooseCurrent();
});

fill();
</script>

</body>
</html>
